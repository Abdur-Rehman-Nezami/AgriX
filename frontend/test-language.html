<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Toggle Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            text-align: center;
        }
        .toggle-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #3B82F6;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 9999;
        }
        .toggle-btn:hover {
            transform: scale(1.1);
            background: #2563EB;
        }
        .toggle-btn.urdu {
            background: #10B981;
        }
        .toggle-btn.urdu:hover {
            background: #059669;
        }
        h1 {
            color: #042E25;
            margin-bottom: 20px;
        }
        .content {
            font-size: 18px;
            line-height: 1.8;
            color: #374151;
        }
        .urdu-text {
            direction: rtl;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Welcome to AgriX</h1>
        <div class="content" id="content">
            <p>This is a test page to verify the language toggle functionality.</p>
            <p>Click the button in the bottom-right corner to switch languages.</p>
        </div>
    </div>

    <button class="toggle-btn" id="langBtn" onclick="toggleLanguage()">
        <span style="font-size: 24px;">🌐</span>
        <span id="langText">اردو</span>
    </button>

    <script>
        let currentLang = localStorage.getItem('language') || 'english';
        
        const translations = {
            english: {
                title: 'Welcome to AgriX',
                content: 'This is a test page to verify the language toggle functionality. Click the button in the bottom-right corner to switch languages.',
                btnText: 'اردو'
            },
            urdu: {
                title: 'AgriX میں خوش آمدید',
                content: 'یہ زبان ٹوگل فعالیت کی تصدیق کے لیے ایک ٹیسٹ صفحہ ہے۔ زبانیں تبدیل کرنے کے لیے نیچے دائیں کونے میں بٹن پر کلک کریں۔',
                btnText: 'EN'
            }
        };

        function updateUI() {
            const btn = document.getElementById('langBtn');
            const title = document.getElementById('title');
            const content = document.getElementById('content');
            const langText = document.getElementById('langText');

            if (currentLang === 'urdu') {
                btn.classList.add('urdu');
                content.classList.add('urdu-text');
            } else {
                btn.classList.remove('urdu');
                content.classList.remove('urdu-text');
            }

            title.textContent = translations[currentLang].title;
            content.innerHTML = `<p>${translations[currentLang].content}</p>`;
            langText.textContent = translations[currentLang].btnText;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'english' ? 'urdu' : 'english';
            localStorage.setItem('language', currentLang);
            updateUI();
        }

        // Initialize on load
        updateUI();
    </script>
</body>
</html>
